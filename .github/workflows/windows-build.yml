name: Windows Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CCACHE_BASEDIR: ${{ github.workspace }}
  QT_VERSION: 6.10.3
  QT_PATH: C:\Qt\6.10.3\msvc2022_64

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Install Qt6
        run: |
          pip install aqtinstall
          aqt install-qt windows desktop $env:QT_VERSION win64_msvc2022_64 -O C:\Qt -m qtwebengine qtwebchannel qtpositioning qtpdf

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake
        run: cmake --preset win32-release
        env:
          CMAKE_PREFIX_PATH: ${{ env.QT_PATH }}
          CMAKE_C_COMPILER_LAUNCHER: ccache
          CMAKE_CXX_COMPILER_LAUNCHER: ccache

      - name: Build
        run: cmake --build build/release --config Release -j $env:NUMBER_OF_PROCESSORS

      - name: Deploy Qt runtime
        run: |
          New-Item -ItemType Directory -Path deploy -Force
          Copy-Item build/release/OmniStudio.exe deploy/
          & "$env:QT_PATH\bin\windeployqt.exe" deploy/OmniStudio.exe --qmldir .

      - name: Package
        run: Compress-Archive -Path deploy/* -DestinationPath OmniStudio-Windows.zip

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: OmniStudio-Windows.zip
          generate_release_notes: true
