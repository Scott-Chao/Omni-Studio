name: macOS Build

on:
  push:
    branches: [crossos]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        run: brew install qt

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt)" \
            -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.logicalcpu)

      - name: Bundle .app with Qt frameworks
        run: |
          $(brew --prefix qt)/bin/macdeployqt build/SmartMarkdown.app \
            -qmldir=. -verbose=2

      - name: Remove broken signatures and re-sign
        run: |
          APP="build/SmartMarkdown.app"

          # Remove all existing signatures recursively
          codesign --remove-signature "$APP" 2>/dev/null || true

          # Also strip individual dylibs and frameworks
          find "$APP" \( -name "*.dylib" -o -name "*.so" \) \
            -exec codesign --remove-signature {} \; 2>/dev/null || true
          find "$APP" -type d -name "*.framework" \
            -exec codesign --remove-signature {} \; 2>/dev/null || true

          # --deep signs all nested components recursively, including
          # QtWebEngineProcess.app inside QtWebEngineCore.framework
          codesign --force --deep --sign - \
            --preserve-metadata=identifier,entitlements \
            "$APP"

      - name: Verify signing
        run: |
          APP="build/SmartMarkdown.app"
          echo "=== CodeSign status ==="
          codesign -dvvv --no-strict "$APP" 2>&1 || true
          echo "=== Verification ==="
          codesign --verify --verbose --no-strict "$APP" 2>&1 || true

      - name: Package .app as zip (preserve bundle structure)
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            build/SmartMarkdown.app SmartMarkdown-macOS.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartMarkdown-macOS
          path: SmartMarkdown-macOS.zip
