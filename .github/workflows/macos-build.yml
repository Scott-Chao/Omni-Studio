name: macOS Build

on:
  workflow_dispatch:

env:
  CCACHE_BASEDIR: ${{ github.workspace }}

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Install Qt6
        run: brew install qt
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
          HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: 1

      - name: Configure CMake
        run: cmake --preset macos-release
        env:
          CMAKE_PREFIX_PATH: $(brew --prefix qt)

      - name: Build
        run: cmake --build build/release -j$(sysctl -n hw.logicalcpu)

      - name: Bundle .app with Qt frameworks
        run: |
          APP="build/release/OmniStudio.app"
          MACDEPLOY="$(brew --prefix qt)/bin/macdeployqt"

          # First pass: deploy frameworks for main app
          "$MACDEPLOY" "$APP" -qmldir=. -verbose=2

          # Second pass: deploy missing QtQuick for QtWebEngineProcess
          # macdeployqt doesn't recursively scan inside nested bundles
          # (QtWebEngineCore.framework -> Helpers/QtWebEngineProcess.app)
          WEP="$(find "$APP" -path "*/QtWebEngineProcess.app/Contents/MacOS/QtWebEngineProcess" | head -1 || true)"
          if [ -n "$WEP" ]; then
            echo "=== Deploying QtQuick for QtWebEngineProcess ==="
            "$MACDEPLOY" "$APP" -executable="$WEP" -verbose=1
          fi

          # Fix @executable_path/../Frameworks → @rpath/ in shared binaries
          # macdeployqt uses @executable_path/../Frameworks for framework deps.
          # This works for the main executable but NOT for nested processes
          # like QtWebEngineProcess (where @executable_path resolves to its
          # own bundle, 7 levels deep). Using @rpath lets each process resolve
          # through its own LC_RPATH entries.
          echo "=== Fixing framework dependency paths for nested processes ==="
          find "$APP/Contents/Frameworks" ! -path "*/Helpers/*" -type f \
              \( -name "*.dylib" -o -name "*.so" -o -name "Qt*" \) 2>/dev/null | while read binary; do
            for dep in $(otool -L "$binary" 2>/dev/null | grep "@executable_path/../Frameworks" | awk '{print $1}'); do
              # Strip prefix @executable_path/../Frameworks → @rpath, keep rest of path
              install_name_tool -change "$dep" "@rpath${dep#@executable_path/../Frameworks}" "$binary" 2>/dev/null || true
            done
          done

          # Add rpath from nested QtWebEngineProcess up to main Frameworks/
          # (7 levels: MacOS → Contents → .app → Helpers → A → Versions → framework → Frameworks)
          if [ -n "$WEP" ]; then
            install_name_tool -add_rpath \
              "@loader_path/../../../../../../../Frameworks" "$WEP" \
              2>/dev/null || echo "  (rpath already set or not applicable)"
            echo "=== QtWebEngineProcess QtQuick deployment complete ==="
          fi

      - name: Remove broken signatures and re-sign
        run: |
          APP="build/release/OmniStudio.app"

          # Remove all existing signatures recursively
          codesign --remove-signature "$APP" 2>/dev/null || true

          # Also strip individual dylibs and frameworks
          find "$APP" \( -name "*.dylib" -o -name "*.so" \) \
            -exec codesign --remove-signature {} \; 2>/dev/null || true
          find "$APP" -type d -name "*.framework" \
            -exec codesign --remove-signature {} \; 2>/dev/null || true

          # --deep signs all nested components recursively, including
          # QtWebEngineProcess.app inside QtWebEngineCore.framework
          codesign --force --deep --sign - \
            --preserve-metadata=identifier,entitlements \
            "$APP"

      - name: Verify signing
        run: |
          APP="build/release/OmniStudio.app"
          echo "=== CodeSign status ==="
          codesign -dvvv --no-strict "$APP" 2>&1 || true
          echo "=== Verification ==="
          codesign --verify --verbose --no-strict "$APP" 2>&1 || true

      - name: Package .app as zip
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            build/release/OmniStudio.app OmniStudio-macOS.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmniStudio-macOS
          path: OmniStudio-macOS.zip
