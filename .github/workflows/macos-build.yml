name: macOS Build

on:
  workflow_dispatch:

env:
  CCACHE_BASEDIR: ${{ github.workspace }}

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Install Qt6
        run: brew install qt
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
          HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: 1

      - name: Configure CMake
        run: cmake --preset macos-release
        env:
          CMAKE_PREFIX_PATH: $(brew --prefix qt)

      - name: Build
        run: cmake --build build/release -j$(sysctl -n hw.logicalcpu)

      - name: Bundle .app with Qt frameworks
        run: |
          $(brew --prefix qt)/bin/macdeployqt build/release/OmniStudio.app \
            -qmldir=. -verbose=2

      - name: Remove broken signatures and re-sign
        run: |
          APP="build/release/OmniStudio.app"

          # Remove all existing signatures recursively
          codesign --remove-signature "$APP" 2>/dev/null || true

          # Also strip individual dylibs and frameworks
          find "$APP" \( -name "*.dylib" -o -name "*.so" \) \
            -exec codesign --remove-signature {} \; 2>/dev/null || true
          find "$APP" -type d -name "*.framework" \
            -exec codesign --remove-signature {} \; 2>/dev/null || true

          # --deep signs all nested components recursively, including
          # QtWebEngineProcess.app inside QtWebEngineCore.framework
          codesign --force --deep --sign - \
            --preserve-metadata=identifier,entitlements \
            "$APP"

      - name: Verify signing
        run: |
          APP="build/release/OmniStudio.app"
          echo "=== CodeSign status ==="
          codesign -dvvv --no-strict "$APP" 2>&1 || true
          echo "=== Verification ==="
          codesign --verify --verbose --no-strict "$APP" 2>&1 || true

      - name: Package .app as zip
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            build/release/OmniStudio.app OmniStudio-macOS.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmniStudio-macOS
          path: OmniStudio-macOS.zip
