name: Linux Build

on:
  workflow_dispatch:

env:
  CCACHE_BASEDIR: ${{ github.workspace }}

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Install Qt6
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev qt6-webengine-dev qt6-pdf-dev qt6-svg-dev

      - name: Configure CMake
        run: cmake --preset linux-release

      - name: Build
        run: cmake --build build/release -j$(nproc)

      - name: Bundle Qt libraries
        run: |
          set -euo pipefail
          sudo apt-get install -y patchelf

          BIN="build/release/OmniStudio"
          DEPLOY="build/deploy"
          mkdir -p "$DEPLOY/lib" "$DEPLOY/plugins/platforms"

          # Helper: copy a .so and all its Qt dependencies into lib/
          copy_qt_deps() {
            local lib
            for lib in $(ldd "$1" 2>/dev/null | grep -oP '(?<==> )/\S+\.so\S*' | grep -E '/libQt6'); do
              [ -f "$lib" ] && cp -L "$lib" "$DEPLOY/lib/"
            done
          }

          # Collect Qt shared libs from the main binary
          copy_qt_deps "$BIN"

          # Use qmake6 to find canonical Qt installation paths
          QT_PREFIX="$(qmake6 -query QT_INSTALL_PREFIX 2>/dev/null || true)"
          QT_PLUGIN_DIR="$(qmake6 -query QT_INSTALL_PLUGINS 2>/dev/null || true)"
          QT_LIBEXEC_DIR="$(qmake6 -query QT_INSTALL_LIBEXECS 2>/dev/null || true)"

          # Copy xcb platform plugin and its Qt dependencies
          XCB_PLUGIN=""
          if [ -n "$QT_PLUGIN_DIR" ] && [ -f "$QT_PLUGIN_DIR/platforms/libqxcb.so" ]; then
            XCB_PLUGIN="$QT_PLUGIN_DIR/platforms/libqxcb.so"
          elif [ -n "$QT_PREFIX" ] && [ -f "$QT_PREFIX/plugins/platforms/libqxcb.so" ]; then
            XCB_PLUGIN="$QT_PREFIX/plugins/platforms/libqxcb.so"
          fi
          if [ -n "$XCB_PLUGIN" ]; then
            cp -L "$XCB_PLUGIN" "$DEPLOY/plugins/platforms/"
            copy_qt_deps "$XCB_PLUGIN"
          fi

          # Copy WebEngine process via canonical path, fallback to find
          WEBENGINE_PROC=""
          if [ -n "$QT_LIBEXEC_DIR" ] && [ -f "$QT_LIBEXEC_DIR/QtWebEngineProcess" ]; then
            WEBENGINE_PROC="$QT_LIBEXEC_DIR/QtWebEngineProcess"
          else
            WEBENGINE_PROC="$(find /usr/lib /usr/share -name "QtWebEngineProcess" 2>/dev/null | head -1 || true)"
          fi
          if [ -n "$WEBENGINE_PROC" ]; then
            cp -L "$WEBENGINE_PROC" "$DEPLOY/"
          fi

          # Copy WebEngine resources (pak files, icudtl.dat) from qmake6 data path
          WEBENGINE_RES=""
          if [ -n "$QT_PREFIX" ] && [ -d "$QT_PREFIX/resources" ]; then
            WEBENGINE_RES="$QT_PREFIX/resources"
          else
            WEBENGINE_RES="$(find /usr/lib /usr/share -maxdepth 5 -path "*/qt6/resources" -type d 2>/dev/null | head -1 || true)"
          fi
          if [ -n "$WEBENGINE_RES" ] && [ "$(ls -A "$WEBENGINE_RES" 2>/dev/null)" ]; then
            cp -rL "$WEBENGINE_RES" "$DEPLOY/resources"
          fi

          # qt.conf tells Qt6 to look for plugins in the plugins/ subdirectory
          echo '[Paths]' > "$DEPLOY/qt.conf"
          echo 'Plugins = plugins' >> "$DEPLOY/qt.conf"

          # Copy binary and set rpath so it finds libs in ./lib/
          cp "$BIN" "$DEPLOY/"
          patchelf --set-rpath '$ORIGIN/lib' "$DEPLOY/OmniStudio"

      - name: Package
        run: |
          tar -czf OmniStudio-Linux.tar.gz \
            -C build/deploy .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmniStudio-Linux
          path: OmniStudio-Linux.tar.gz
