name: Linux Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CCACHE_BASEDIR: ${{ github.workspace }}

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Install Qt6
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev qt6-webengine-dev qt6-pdf-dev qt6-svg-dev qt6-wayland

      - name: Configure CMake
        run: cmake --preset linux-release

      - name: Build
        run: cmake --build build/release -j$(nproc)

      - name: Bundle Qt libraries
        run: |
          set -euo pipefail
          sudo apt-get install -y patchelf

          BIN="build/release/OmniStudio"
          DEPLOY="build/deploy"
          mkdir -p "$DEPLOY/lib" "$DEPLOY/plugins/platforms"

          # Helper: copy a .so and all its Qt dependencies into lib/
          copy_qt_deps() {
            local lib
            for lib in $(ldd "$1" 2>/dev/null | grep -oP '(?<==> )/\S+\.so\S*' | grep -E '/libQt6'); do
              [ -f "$lib" ] && cp -L "$lib" "$DEPLOY/lib/"
            done
          }

          # Collect Qt shared libs from the main binary
          copy_qt_deps "$BIN"

          # Use qmake6 to find canonical Qt installation paths
          QT_PREFIX="$(qmake6 -query QT_INSTALL_PREFIX 2>/dev/null || true)"
          QT_PLUGIN_DIR="$(qmake6 -query QT_INSTALL_PLUGINS 2>/dev/null || true)"
          QT_LIBEXEC_DIR="$(qmake6 -query QT_INSTALL_LIBEXECS 2>/dev/null || true)"

          # Copy platform plugins and their Qt dependencies
          PLATFORM_PLUGIN_DIR=""
          if [ -n "$QT_PLUGIN_DIR" ] && [ -d "$QT_PLUGIN_DIR/platforms" ]; then
            PLATFORM_PLUGIN_DIR="$QT_PLUGIN_DIR/platforms"
          elif [ -n "$QT_PREFIX" ] && [ -d "$QT_PREFIX/plugins/platforms" ]; then
            PLATFORM_PLUGIN_DIR="$QT_PREFIX/plugins/platforms"
          fi
          for plugin in libqxcb.so libqwayland-generic.so libqwayland-egl.so; do
            if [ -n "$PLATFORM_PLUGIN_DIR" ] && [ -f "$PLATFORM_PLUGIN_DIR/$plugin" ]; then
              cp -L "$PLATFORM_PLUGIN_DIR/$plugin" "$DEPLOY/plugins/platforms/"
              copy_qt_deps "$PLATFORM_PLUGIN_DIR/$plugin"
            fi
          done

          # Copy Wayland sub-plugin directories (shell integration, graphics, decorations)
          if [ -n "$QT_PLUGIN_DIR" ] && [ -d "$QT_PLUGIN_DIR" ]; then
            for sub in wayland-shell-integration wayland-graphics-integration-client wayland-decoration-client; do
              if [ -d "$QT_PLUGIN_DIR/$sub" ]; then
                cp -rL "$QT_PLUGIN_DIR/$sub" "$DEPLOY/plugins/$sub"
                for lib in "$QT_PLUGIN_DIR/$sub"/*.so; do
                  [ -f "$lib" ] && copy_qt_deps "$lib"
                done
              fi
            done
          fi

          # Copy WebEngine process via canonical path, fallback to find
          WEBENGINE_PROC=""
          if [ -n "$QT_LIBEXEC_DIR" ] && [ -f "$QT_LIBEXEC_DIR/QtWebEngineProcess" ]; then
            WEBENGINE_PROC="$QT_LIBEXEC_DIR/QtWebEngineProcess"
          else
            WEBENGINE_PROC="$(find /usr/lib /usr/share -name "QtWebEngineProcess" 2>/dev/null | head -1 || true)"
          fi
          if [ -n "$WEBENGINE_PROC" ]; then
            cp -L "$WEBENGINE_PROC" "$DEPLOY/"
          fi

          # Copy WebEngine resources (pak files, icudtl.dat) from qmake6 data path
          WEBENGINE_RES=""
          if [ -n "$QT_PREFIX" ] && [ -d "$QT_PREFIX/resources" ]; then
            WEBENGINE_RES="$QT_PREFIX/resources"
          else
            WEBENGINE_RES="$(find /usr/lib /usr/share -maxdepth 5 -path "*/qt6/resources" -type d 2>/dev/null | head -1 || true)"
          fi
          if [ -n "$WEBENGINE_RES" ] && [ "$(ls -A "$WEBENGINE_RES" 2>/dev/null)" ]; then
            cp -rL "$WEBENGINE_RES" "$DEPLOY/resources"
          fi

          # Copy WebEngine locale files (en-US.pak etc.)
          WEBENGINE_LOCALES=""
          QT_TRANSLATIONS_DIR="$(qmake6 -query QT_INSTALL_TRANSLATIONS 2>/dev/null || true)"
          if [ -n "$QT_TRANSLATIONS_DIR" ] && [ -d "$QT_TRANSLATIONS_DIR/qtwebengine_locales" ]; then
            WEBENGINE_LOCALES="$QT_TRANSLATIONS_DIR/qtwebengine_locales"
          else
            WEBENGINE_LOCALES="$(find /usr/lib /usr/share -maxdepth 5 -path "*/qtwebengine_locales" -type d 2>/dev/null | head -1 || true)"
          fi
          if [ -n "$WEBENGINE_LOCALES" ] && [ "$(ls -A "$WEBENGINE_LOCALES" 2>/dev/null)" ]; then
            mkdir -p "$DEPLOY/translations"
            cp -rL "$WEBENGINE_LOCALES" "$DEPLOY/translations/"
          fi

          # qt.conf tells Qt6 to look for plugins in the plugins/ subdirectory
          echo '[Paths]' > "$DEPLOY/qt.conf"
          echo 'Plugins = plugins' >> "$DEPLOY/qt.conf"

          # Copy binary and set rpath so it finds libs in ./lib/
          cp "$BIN" "$DEPLOY/"
          patchelf --set-rpath '$ORIGIN/lib' "$DEPLOY/OmniStudio"

      - name: Package
        run: |
          tar -czf OmniStudio-Linux.tar.gz \
            -C build/deploy .

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: OmniStudio-Linux.tar.gz
          generate_release_notes: true
