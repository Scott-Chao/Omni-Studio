<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="katex.min.css">
<style>
  :root {
    --bg: #2d2d2d;
    --fg: #e0e0e0;
    --code-bg: #1e1e1e;
    --border: #555;
    --link: #569cd6;
    --heading: #ffffff;
    --blockquote: #aaa;
    --th-bg: #3c3c3c;
    --hr: #444;
  }
  body {
    background-color: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif;
    line-height: 1.7;
    padding: 24px 32px;
    max-width: 960px;
    margin: 0;
  }
  h1, h2, h3, h4, h5, h6 {
    color: var(--heading);
    margin-top: 1.5em;
    margin-bottom: 0.5em;
    border-bottom: none;
  }
  h1 { font-size: 2em; }
  h2 { font-size: 1.5em; }
  h3 { font-size: 1.25em; }
  a {
    color: var(--link);
    text-decoration: none;
  }
  a:hover {
    text-decoration: underline;
  }
  pre {
    background: var(--code-bg);
    padding: 16px;
    border-radius: 6px;
    overflow-x: auto;
  }
  code {
    background: var(--code-bg);
    padding: 2px 6px;
    border-radius: 3px;
    font-family: "Cascadia Code", "Fira Code", Consolas, "Courier New", monospace;
    font-size: 0.9em;
  }
  pre code {
    background: none;
    padding: 0;
    border-radius: 0;
  }
  table {
    border-collapse: collapse;
    width: 100%;
    margin: 1em 0;
  }
  th, td {
    border: 1px solid var(--border);
    padding: 8px 12px;
    text-align: left;
  }
  th {
    background: var(--th-bg);
  }
  blockquote {
    border-left: 4px solid var(--link);
    padding-left: 16px;
    color: var(--blockquote);
    margin-left: 0;
  }
  hr {
    border: none;
    border-top: 1px solid var(--hr);
    margin: 1.5em 0;
  }
  img {
    max-width: 100%;
    height: auto;
  }
  ul, ol {
    padding-left: 2em;
  }
  li {
    margin: 0.25em 0;
  }
  .katex {
    color: var(--fg);
  }
  .mermaid {
    text-align: center;
    margin: 1em 0;
  }
  .mermaid svg {
    max-width: 100%;
    height: auto;
    background: #fff;
    border-radius: 6px;
    padding: 8px;
  }
  /* code block header with run button */
  .code-block-wrapper {
    margin: 1em 0;
  }
  .code-block-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #333;
    padding: 4px 12px;
    border-radius: 6px 6px 0 0;
    font-size: 0.85em;
  }
  .code-lang-label {
    color: #999;
  }
  .run-code-btn {
    color: #4ec9b0;
    cursor: pointer;
    text-decoration: none;
    font-weight: bold;
  }
  .run-code-btn:hover {
    color: #6df0d0;
  }
  .code-block-wrapper pre {
    margin: 0;
    border-radius: 0 0 6px 6px;
  }
  /* task list styling */
  .task-list-item {
    list-style: none;
    margin-left: -1.5em;
  }
  .task-list-item input[type="checkbox"] {
    margin-right: 0.5em;
  }
</style>
</head>
<body>
<div id="preview"></div>
<script id="markdown-content" type="text/markdown">{{MARKDOWN_CONTENT}}</script>
<script src="marked.min.js"></script>
<script src="katex.min.js"></script>
<script src="auto-render.min.js"></script>
<script src="mermaid.min.js"></script>
<script>
(function() {
  // Initialize Mermaid
  mermaid.initialize({
    startOnLoad: false,
    theme: 'default',
    securityLevel: 'loose'
  });

  // Configure marked.js (v15 modern API)
  marked.use({
    breaks: true,
    gfm: true
  });

  // Custom renderer for code blocks (marked v15 token-based API)
  var runnableLangs = ['python', 'py', 'cpp', 'c', 'cc', 'cxx'];
  const renderer = {
    code(token) {
      if (token.lang === 'mermaid') {
        return '<div class="mermaid">' + token.text + '</div>';
      }
      // Pre-highlighted code blocks (base64-encoded HTML from C++)
      if (token.lang === 'highlighted') {
        var b64 = token.text.trim();
        var binary = atob(b64);
        var bytes = new Uint8Array(binary.length);
        for (var i = 0; i < binary.length; i++) {
          bytes[i] = binary.charCodeAt(i);
        }
        return new TextDecoder('utf-8').decode(bytes);
      }
      var lang = (token.lang || '').toLowerCase();
      var code = token.text;
      var escapedCode = code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      var showRun = runnableLangs.indexOf(lang) !== -1;
      var header = '';
      if (showRun) {
        var attrCode = escapedCode.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        header = '<div class="code-block-header">'
          + '<span class="code-lang-label">' + (token.lang || 'code') + '</span>'
          + '<a class="run-code-btn" href="runblock:execute" data-lang="' + lang + '" data-code="' + attrCode + '">▶ Run</a>'
          + '</div>';
      }
      return '<div class="code-block-wrapper">' + header
        + '<pre><code class="language-' + (token.lang || '') + '">' + escapedCode + '</code></pre>'
        + '</div>';
    }
  };
  marked.use({ renderer: renderer });

  // --- UTF-8 safe base64 decode (atob returns binary string, not UTF-8) ---
  window.renderFromBase64 = function(b64) {
    var binary = atob(b64);
    var bytes = new Uint8Array(binary.length);
    for (var i = 0; i < binary.length; i++) {
      bytes[i] = binary.charCodeAt(i);
    }
    window.renderMarkdown(new TextDecoder('utf-8').decode(bytes));
  };

  // --- Math + Markdown rendering (callable from C++ via runJavaScript) ---
  window.renderMarkdown = function(mdContent) {
    var mathBlocks = [];

    function storeMath(latex, displayMode) {
      var idx = mathBlocks.length;
      try {
        mathBlocks[idx] = katex.renderToString(latex.trim(), {
          displayMode: displayMode,
          throwOnError: false
        });
      } catch (e) {
        mathBlocks[idx] = '<span style="color:#f88">KaTeX: ' + (e.message || e) + '</span>';
      }
      return '\x00MATH' + idx + '\x00';
    }

    // Process in order: display math first, then inline, to avoid $ matching $$
    // 1. $$ ... $$  (display math)
    mdContent = mdContent.replace(/\$\$([\s\S]*?)\$\$/g, function(m, latex) {
      return storeMath(latex, true);
    });
    // 2. \[ ... \]  (display math, alternative)
    mdContent = mdContent.replace(/\\\[([\s\S]*?)\\\]/g, function(m, latex) {
      return storeMath(latex, true);
    });
    // 3. \( ... \)  (inline math, alternative — before $ to avoid conflicts)
    mdContent = mdContent.replace(/\\\(([\s\S]*?)\\\)/g, function(m, latex) {
      return storeMath(latex, false);
    });
    // 4. $ ... $  (inline math — single-line, non-greedy)
    mdContent = mdContent.replace(/\$([^\$\n]+?)\$/g, function(m, latex) {
      return storeMath(latex, false);
    });

    // Markdown -> HTML (math protected by null-byte placeholders)
    var html = marked.parse(mdContent);

    // Restore math placeholders with pre-rendered KaTeX HTML
    for (var i = 0; i < mathBlocks.length; i++) {
      html = html.split('\x00MATH' + i + '\x00').join(mathBlocks[i]);
    }

    document.getElementById('preview').innerHTML = html;

    // Render Mermaid diagrams
    (async function() {
      const mermaidElements = document.querySelectorAll('.mermaid');
      if (mermaidElements.length > 0) {
        for (var i = 0; i < mermaidElements.length; i++) {
          var el = mermaidElements[i];
          var code = el.textContent.trim();
          try {
            var result = await mermaid.render('mermaid-svg-' + i, code);
            el.innerHTML = result.svg;
          } catch(err) {
            el.innerHTML = '<span style="color:#f88">Mermaid: ' + (err.message || err) + '</span>';
          }
        }
      }
    })();
  };

  // Run button click handler
  document.addEventListener('click', function(e) {
    var btn = e.target.closest('.run-code-btn');
    if (btn) {
      e.preventDefault();
      var lang = btn.getAttribute('data-lang');
      var code = btn.getAttribute('data-code');
      // Decode HTML entities back to raw code
      var ta = document.createElement('textarea');
      ta.innerHTML = code;
      code = ta.value;
      window._runCodeData = JSON.stringify({lang: lang, code: code});
      window.location.href = 'runblock:execute';
    }
  });

  // Initial render on page load
  window.renderMarkdown(document.getElementById('markdown-content').textContent);
})();
</script>
</body>
</html>
