<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="katex.min.css">
<style>
  :root {
    --bg: #2d2d2d;
    --fg: #e0e0e0;
    --code-bg: #1e1e1e;
    --border: #555;
    --link: #569cd6;
    --heading: #ffffff;
    --blockquote: #aaa;
    --th-bg: #3c3c3c;
    --hr: #444;
  }
  body {
    background-color: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif;
    line-height: 1.7;
    padding: 24px 32px;
    max-width: 960px;
    margin: 0 auto;
  }
  h1, h2, h3, h4, h5, h6 {
    color: var(--heading);
    margin-top: 1.5em;
    margin-bottom: 0.5em;
    border-bottom: none;
  }
  h1 { font-size: 2em; }
  h2 { font-size: 1.5em; }
  h3 { font-size: 1.25em; }
  a {
    color: var(--link);
    text-decoration: none;
  }
  a:hover {
    text-decoration: underline;
  }
  pre {
    background: var(--code-bg);
    padding: 16px;
    border-radius: 6px;
    overflow-x: auto;
  }
  code {
    background: var(--code-bg);
    padding: 2px 6px;
    border-radius: 3px;
    font-family: "Cascadia Code", "Fira Code", Consolas, "Courier New", monospace;
    font-size: 0.9em;
  }
  pre code {
    background: none;
    padding: 0;
    border-radius: 0;
  }
  table {
    border-collapse: collapse;
    width: 100%;
    margin: 1em 0;
  }
  th, td {
    border: 1px solid var(--border);
    padding: 8px 12px;
    text-align: left;
  }
  th {
    background: var(--th-bg);
  }
  blockquote {
    border-left: 4px solid var(--link);
    padding-left: 16px;
    color: var(--blockquote);
    margin-left: 0;
  }
  hr {
    border: none;
    border-top: 1px solid var(--hr);
    margin: 1.5em 0;
  }
  img {
    max-width: 100%;
    height: auto;
  }
  ul, ol {
    padding-left: 2em;
  }
  li {
    margin: 0.25em 0;
  }
  .katex {
    color: var(--fg);
  }
  .mermaid {
    text-align: center;
    margin: 1em 0;
  }
  .mermaid svg {
    max-width: 100%;
    height: auto;
    background: #fff;
    border-radius: 6px;
    padding: 8px;
  }
  /* task list styling */
  .task-list-item {
    list-style: none;
    margin-left: -1.5em;
  }
  .task-list-item input[type="checkbox"] {
    margin-right: 0.5em;
  }
</style>
</head>
<body>
<div id="preview"></div>
<script id="markdown-content" type="text/markdown">{{MARKDOWN_CONTENT}}</script>
<script src="marked.min.js"></script>
<script src="katex.min.js"></script>
<script src="auto-render.min.js"></script>
<script src="mermaid.min.js"></script>
<script>
(function() {
  // Initialize Mermaid
  mermaid.initialize({
    startOnLoad: false,
    theme: 'default',
    securityLevel: 'loose'
  });

  // Configure marked.js (v15 modern API)
  marked.use({
    breaks: true,
    gfm: true
  });

  // Custom renderer for mermaid code blocks (marked v15 token-based API)
  const renderer = {
    code(token) {
      if (token.lang === 'mermaid') {
        return '<div class="mermaid">' + token.text + '</div>';
      }
      return false;
    }
  };
  marked.use({ renderer: renderer });

  // Parse markdown
  const mdContent = document.getElementById('markdown-content').textContent;
  const html = marked.parse(mdContent);
  document.getElementById('preview').innerHTML = html;

  // Render KaTeX math
  try {
    renderMathInElement(document.getElementById('preview'), {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$', right: '$', display: false},
        {left: '\\[', right: '\\]', display: true},
        {left: '\\(', right: '\\)', display: false}
      ],
      throwOnError: false
    });
  } catch(e) {
    console.error('KaTeX error:', e);
  }

  // Render Mermaid diagrams
  (async function() {
    const mermaidElements = document.querySelectorAll('.mermaid');
    if (mermaidElements.length > 0) {
      for (var i = 0; i < mermaidElements.length; i++) {
        var el = mermaidElements[i];
        var code = el.textContent.trim();
        try {
          var result = await mermaid.render('mermaid-svg-' + i, code);
          el.innerHTML = result.svg;
        } catch(err) {
          el.innerHTML = '<span style="color:#f88">Mermaid: ' + (err.message || err) + '</span>';
        }
      }
    }
  })();
})();
</script>
</body>
</html>
