<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B2665"/>
      <stop offset="100%" stop-color="#1E4D8C"/>
    </linearGradient>

    <linearGradient id="loopGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F2D7CF"/>
      <stop offset="25%" stop-color="#B7B5E8"/>
      <stop offset="55%" stop-color="#8A97E6"/>
      <stop offset="100%" stop-color="#6E86D8"/>
    </linearGradient>

    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="8"
                    flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect x="10" y="10" width="1004" height="1004" rx="200" fill="url(#bgGrad)"/>

  <g transform="translate(512,512) scale(2.0) translate(-512,-512)">
    <path
      d="
        M 320 512
        C 320 400, 455 400, 512 512
        C 569 624, 704 624, 704 512
        C 704 400, 569 400, 512 512
        C 455 624, 320 624, 320 512
      "
      fill="none"
      stroke="url(#loopGrad)"
      stroke-width="52"
      stroke-linecap="round"
      stroke-linejoin="round"
      filter="url(#shadow)"
    />
  </g>
</svg>
